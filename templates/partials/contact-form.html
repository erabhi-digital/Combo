<div class="col-lg-6 px-0 mb-5 mb-sm-0">
  <div class="glass-card">
    <h3 class="mb-4">Send us a Message</h3>

    <form method="POST"  id="contactForm">
      {% csrf_token %}

      <div class="row g-3">

        <!-- Name -->
        <div class="col-12">
          <label for="name" class="form-label">Full Name</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            required
          />
        </div>

        <!-- Email -->
        <div class="col-12">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            required
          />
        </div>

        <!-- Subject -->
        <div class="col-12">
          <label for="sub" class="form-label">Subject</label>
          <input
            type="text"
            class="form-control"
            id="sub"
            name="sub"
            required
          />
        </div>

        <!-- Message -->
        <div class="col-12">
          <label for="message" class="form-label">Message</label>
          <textarea
            class="form-control"
            id="message"
            name="message"
            rows="5"
            required
          ></textarea>
        </div>

        <!-- Submit -->
        <div class="col-12">
          <button type="submit" class="btn btn-gradient w-100">
            <i class="fas fa-paper-plane me-2"></i>
            Send Message
          </button>
        </div>

      </div>
    </form>
  </div>
</div>
