{% load static %}

<!-- ============================= -->
<!-- Google Fonts (Performance Optimized) -->
<!-- ============================= -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;900&display=swap"
  rel="stylesheet"
  media="all"
/>

<!-- ============================= -->
<!-- Core CSS -->
<!-- ============================= -->

<!-- Bootstrap -->
<link
  rel="stylesheet"
  href="{% static 'css/bootstrap.min.css' %}"
  type="text/css"
/>

<!-- Font Awesome (CDN with security attributes) -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
  type="text/css"
/>

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/main.min.css' %}" type="text/css" />

<!-- ============================= -->
<!-- Favicons & App Icons -->
<!-- ============================= -->

<link
  rel="apple-touch-icon"
  sizes="180x180"
  href="{% static 'favicon/apple-touch-icon.png' %}"
/>

<link
  rel="icon"
  type="image/png"
  sizes="32x32"
  href="{% static 'favicon/favicon-32x32.png' %}"
/>

<link
  rel="icon"
  type="image/png"
  sizes="16x16"
  href="{% static 'favicon/favicon-16x16.png' %}"
/>

<link
  rel="manifest"
  href="{% static 'favicon/site.webmanifest' %}"
  crossorigin="use-credentials"
/>
