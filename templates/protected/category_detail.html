{% extends 'base.html' %} {% load static %} {% block content %}

<section class="combo-list-section py-2">
  <div class="container px-0">
    <div class="row justify-content-center mt-md-3">
      <!-- Search -->
      <div class="col-lg-10 col-md-10 col-12 mt-md-3">
        <form method="GET">
          <div
            class="input-group mb-3 d-flex flex-md-row flex-column align-items-center justify-content-center gap-md-4 gap-3 glass-card"
          >
            <div
              class="label-badge rounded-5 text-center m-0 col-md-4 col-10 mx-auto text-capitalize"
            >
              <span class="fs-5">{{ category }} Category List</span>
            </div>

            <div class="col-12 col-md-7">
              <input
                type="text"
                id="searchInput"
                class="form-control rounded-5"
                placeholder="Search mobile models..."
              />
            </div>
          </div>
        </form>
      </div>

      <!-- Combo List -->
      <div class="col-lg-10 col-md-10 col-12 mt-md-3">
        {% for combo in combos %}

        <div class="combo-item combo-list-container glass-card p-4 mb-3">
          <h4 class="main-model text-gradient mb-2 text-capitalize">
            {{ combo.main_model }}
          </h4>

          <p class="compatible-model mb-0 text-capitalize">
            {{ combo.compatible_model }}
          </p>
        </div>

        {% empty %}

        <div class="text-center py-5">
          <p>No models found.</p>
        </div>

        {% endfor %}
      </div>
    </div>
  </div>
</section>

{% endblock %} {% block extra_js %}
<script
  src="{% static 'js/filter.min.js' %}"
  type="text/javascript"
  defer
></script>
{% endblock %}
