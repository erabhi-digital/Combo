{% extends "base.html" %} {% block content %}
<section class="error-section py-5">
  <div class="container px-0">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="pricing-card glass-card text-center p-5 position-relative">
          <!-- Badge -->
          <div class="featured-badge">ERROR</div>

          <!-- Error Code -->
          <h1 class="fw-bold display-1 mb-2">404</h1>

          <!-- Title -->
          <h2 class="section-title mb-3">Page Not Found</h2>

          <!-- Description -->
          <p class="pricing-desc mx-auto mb-4">
            The page you are looking for doesn’t exist or has been moved.
          </p>

          <!-- Highlights -->
          <p class="text-gradient mb-4">
            ✔ Check URL • ✔ Try Again • ✔ Go Back Home
          </p>

          <!-- CTA -->
          <a href="/" class="btn btn-gradient px-5 py-3"> Go to Home </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
